<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Something Broke</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    /* ── ANIMATED BACKGROUND BLOBS ────────────────── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
    }

    .blob-1 {
      width: 500px; height: 500px;
      background: #fff;
      top: -15%; right: -10%;
      animation: blobReveal 1.4s ease forwards, blobDrift1 14s ease-in-out infinite 0s;
      animation-fill-mode: forwards;
    }

    .blob-2 {
      width: 400px; height: 400px;
      background: #fff;
      bottom: 0%; left: 10%;
      animation: blobReveal2 1.8s 0.3s ease forwards, blobDrift2 18s ease-in-out 2s infinite;
      animation-fill-mode: forwards;
    }

    .blob-3 {
      width: 300px; height: 300px;
      background: #fff;
      top: 40%; right: 20%;
      animation: blobReveal3 2s 0.5s ease forwards, blobDrift3 22s ease-in-out 4s infinite;
      animation-fill-mode: forwards;
    }

    @keyframes blobReveal  { from { opacity: 0; } to { opacity: 0.07; } }
    @keyframes blobReveal2 { from { opacity: 0; } to { opacity: 0.05; } }
    @keyframes blobReveal3 { from { opacity: 0; } to { opacity: 0.04; } }

    @keyframes blobDrift1 {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-40px, 60px) scale(1.1); }
      66%      { transform: translate(20px, -30px) scale(0.95); }
    }
    @keyframes blobDrift2 {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(60px, -50px) scale(1.1); }
      66%      { transform: translate(-30px, 30px) scale(0.95); }
    }
    @keyframes blobDrift3 {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-50px, -40px) scale(1.1); }
      66%      { transform: translate(40px, 60px) scale(0.95); }
    }

    /* ── BROKEN SCENE (mirrors bedroom scene) ──────── */
    .bed-scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .blanket {
      position: absolute;
      bottom: 0; left: 0;
      width: 58%; height: 72%;
      background: linear-gradient(135deg, #110000 0%, #1a0a0a 60%, transparent 100%);
      clip-path: polygon(0 20%, 100% 0%, 100% 100%, 0 100%);
      border-top-right-radius: 60px;
      opacity: 0;
      animation: curtainReveal 1s 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .sheet {
      position: absolute;
      bottom: 0; left: 0;
      width: 52%; height: 65%;
      background: #1a0f0f;
      clip-path: polygon(0 28%, 100% 8%, 100% 100%, 0 100%);
      border-top-right-radius: 50px;
      opacity: 0;
      animation: curtainReveal 1s 0.8s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes curtainReveal {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 0.7; transform: translateY(0); }
    }

    /* ── SPOTLIGHT BEAM (red-tinted for 500) ────────── */
    .beam-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .beam {
      position: absolute;
      top: -8%; right: -5%;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 0 130vh 110vw;
      border-color: transparent transparent rgba(255,60,60,0.04) transparent;
      transform-origin: top right;
      filter: blur(30px);
      opacity: 0;
      animation: beamIn 1.5s 0.4s ease forwards, beamSway 12s 2s ease-in-out infinite;
    }

    .beam-core {
      position: absolute;
      top: -4%; right: -2%;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 0 90vh 60vw;
      border-color: transparent transparent rgba(255,80,80,0.07) transparent;
      transform-origin: top right;
      filter: blur(12px);
      opacity: 0;
      animation: beamIn 1.5s 0.6s ease forwards, beamSway 12s 2s ease-in-out infinite;
    }

    @keyframes beamIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes beamSway {
      0%,100% { transform: rotate(0deg); }
      30%      { transform: rotate(2deg); }
      70%      { transform: rotate(-1.5deg); }
    }

    /* ── 500 NUMBERS ──────────────────────────────── */
    .error-nums {
      position: fixed;
      bottom: 2%; left: -2%;
      z-index: 3;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(130px, 30vw, 260px);
      line-height: 0.85;
      letter-spacing: -8px;
      color: #150000;
      -webkit-text-stroke: 2px #2a1010;
      text-shadow: 4px 4px 0 #1a0808;
      user-select: none;
      opacity: 0;
      animation:
        numsIn 1s 1s cubic-bezier(.22,1,.36,1) forwards,
        numFloat 7s 2.2s ease-in-out infinite;
    }

    @keyframes numsIn {
      from { opacity: 0; transform: translateY(40px) rotate(-2deg); }
      to   { opacity: 1; transform: translateY(0px) rotate(-2deg); }
    }

    @keyframes numFloat {
      0%,100% { transform: translateY(0px) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(-1deg); }
    }

    /* ── GLITCH FLICKER on the 500 ───────────────── */
    @keyframes glitch {
      0%, 90%, 100% { opacity: 1; text-shadow: 4px 4px 0 #1a0808; }
      92%            { opacity: 0.6; text-shadow: -4px 4px 0 #ff2020, 4px -4px 0 #1a0808; transform: translateY(0px) rotate(-2deg) skewX(2deg); }
      94%            { opacity: 1; text-shadow: 4px 4px 0 #1a0808; }
      96%            { opacity: 0.7; text-shadow: 4px 4px 0 #ff1010; transform: translateY(-14px) rotate(-1deg) skewX(-1deg); }
      98%            { opacity: 1; }
    }

    .error-nums.loaded {
      animation:
        numsIn 1s 1s cubic-bezier(.22,1,.36,1) forwards,
        glitch 5s 2.5s ease-in-out infinite;
    }

    /* ── CONTENT ANCHOR ───────────────────────────── */
    .content-anchor {
      position: fixed;
      top: 50%;
      right: 5%;
      transform: translateY(-50%);
      z-index: 5;
      width: min(540px, 90vw);
    }

    /* ── SKELETON LOADERS ─────────────────────────── */
    .skeleton-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
    }

    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, #1a0a0a 25%, #2a1010 50%, #1a0a0a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 14px;
    }

    .sk-title-1 { width: 60%; height: 44px; border-radius: 8px; }
    .sk-title-2 { width: 80%; height: 44px; border-radius: 8px; }
    .sk-sub-1   { width: 90%; height: 14px; border-radius: 4px; margin-top: 8px; }
    .sk-sub-2   { width: 75%; height: 14px; border-radius: 4px; }
    .sk-sub-3   { width: 55%; height: 14px; border-radius: 4px; }
    .sk-btn-wrap { display: flex; gap: 12px; margin-top: 22px; }
    .sk-btn-1   { width: 150px; height: 48px; border-radius: 50px; margin-bottom: 0; }
    .sk-btn-2   { width: 110px; height: 48px; border-radius: 50px; margin-bottom: 0; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── REAL CONTENT ─────────────────────────────── */
    .stage {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
      text-align: right;
      opacity: 0;
      pointer-events: none;
    }

    .stage.visible {
      display: flex;
      opacity: 1;
      pointer-events: auto;
      animation: contentReveal 0.7s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes contentReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ff5555;
      background: rgba(255,50,50,0.1);
      border: 1px solid rgba(255,50,50,0.25);
      padding: 5px 12px;
      border-radius: 50px;
      margin-bottom: 18px;
      opacity: 0;
      animation: lineUp 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .tag-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ff4444;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 5.5vw, 48px);
      color: #fff;
      line-height: 1.15;
      margin-bottom: 14px;
      opacity: 0;
      animation: lineUp 0.6s 0.1s cubic-bezier(.22,1,.36,1) forwards;
    }

    .subtitle {
      font-size: clamp(14px, 2vw, 16px);
      color: #777;
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 36px;
      opacity: 0;
      animation: lineUp 0.6s 0.2s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes lineUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      opacity: 0;
      animation: lineUp 0.6s 0.3s cubic-bezier(.22,1,.36,1) forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 13px 28px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(255,255,255,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 36px rgba(255,255,255,0.25);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 13px 24px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }

    /* ── SCANLINE ─────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
    }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 600px) {
      .content-anchor {
        right: 50%;
        transform: translate(50%, -50%);
      }
      .skeleton-wrap, .stage {
        align-items: center;
        text-align: center;
      }
      .actions { justify-content: center; }
      .subtitle { max-width: 100%; }
      .error-nums { font-size: 22vw; left: -4%; }
      .blanket { width: 80%; height: 55%; }
      .sheet { width: 75%; height: 50%; }
    }
  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Broken scene -->
  <div class="bed-scene">
    <div class="blanket"></div>
    <div class="sheet"></div>
  </div>

  <!-- Spotlight beam (red-tinted) -->
  <div class="beam-wrap">
    <div class="beam"></div>
    <div class="beam-core"></div>
  </div>

  <!-- 500 numbers -->
  <div class="error-nums" id="errorNums" aria-hidden="true">500</div>

  <!-- Shared anchor -->
  <div class="content-anchor">
    <!-- Skeleton loader -->
    <div class="skeleton-wrap" id="skeleton">
      <div class="skeleton sk-title-1"></div>
      <div class="skeleton sk-title-2"></div>
      <div class="skeleton sk-sub-1"></div>
      <div class="skeleton sk-sub-2"></div>
      <div class="skeleton sk-sub-3"></div>
      <div class="sk-btn-wrap">
        <div class="skeleton sk-btn-1"></div>
        <div class="skeleton sk-btn-2"></div>
      </div>
    </div>

    <!-- Real content -->
    <main class="stage" id="content">
      <div class="tag">
        <span class="tag-dot"></span>
        Server Error
      </div>
      <h1 class="title">We broke<br/>something big.</h1>
      <p class="subtitle">
        Something went wrong on our end — it's not you, it's us. Our team has been notified. Try refreshing or come back shortly.
      </p>
      <div class="actions">
        <a href="javascript:location.reload()" class="btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
          Try Again
        </a>
        <a href="/" class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
          </svg>
          Back to Home
        </a>
      </div>
    </main>
  </div>

  <script>
    setTimeout(() => {
      const sk = document.getElementById('skeleton');
      const content = document.getElementById('content');
      const nums = document.getElementById('errorNums');
      sk.style.transition = 'opacity 0.4s';
      sk.style.opacity = '0';
      setTimeout(() => {
        sk.style.display = 'none';
        content.classList.add('visible');
        nums.classList.add('loaded');
      }, 400);
    }, 1600);
  </script>
</body>
</html>
