<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost in the Void</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      position: relative;
    }

    /* ── ANIMATED BACKGROUND BLOBS ────────────────── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: blobReveal 1.2s ease forwards, blobDrift var(--dur) ease-in-out infinite var(--delay);
    }

    @keyframes blobReveal {
      from { opacity: 0; }
      to   { opacity: var(--op); }
    }

    @keyframes blobDrift {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(var(--tx1), var(--ty1)) scale(1.1); }
      66%      { transform: translate(var(--tx2), var(--ty2)) scale(0.95); }
    }

    .blob-1 {
      width: 500px; height: 500px;
      background: #fff;
      top: -15%; right: -10%;
      --op: 0.07;
      --dur: 14s; --delay: 0s;
      --tx1: -40px; --ty1: 60px;
      --tx2: 20px;  --ty2: -30px;
      animation: blobReveal 1.4s ease forwards, blobDrift 14s ease-in-out infinite 0s;
      animation-fill-mode: forwards;
    }

    .blob-2 {
      width: 400px; height: 400px;
      background: #fff;
      bottom: 0%; left: 10%;
      --op: 0.05;
      --dur: 18s; --delay: 2s;
      --tx1: 60px;  --ty1: -50px;
      --tx2: -30px; --ty2: 30px;
      animation: blobReveal 1.8s 0.3s ease forwards, blobDrift 18s ease-in-out 2s infinite;
      animation-fill-mode: forwards;
    }

    .blob-3 {
      width: 300px; height: 300px;
      background: #fff;
      top: 40%; right: 20%;
      --op: 0.04;
      --dur: 22s; --delay: 4s;
      --tx1: -50px; --ty1: -40px;
      --tx2: 40px;  --ty2: 60px;
      animation: blobReveal 2s 0.5s ease forwards, blobDrift 22s ease-in-out 4s infinite;
      animation-fill-mode: forwards;
    }

    /* ── BEDROOM SCENE ────────────────────────────── */
    .bed-scene {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .blanket {
      position: absolute;
      bottom: 0; left: 0;
      width: 58%; height: 72%;
      background: linear-gradient(135deg, #111 0%, #1a1a1a 60%, transparent 100%);
      clip-path: polygon(0 20%, 100% 0%, 100% 100%, 0 100%);
      border-top-right-radius: 60px;
      opacity: 0;
      animation: curtainReveal 1s 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .sheet {
      position: absolute;
      bottom: 0; left: 0;
      width: 52%; height: 65%;
      background: #1e1e1e;
      clip-path: polygon(0 28%, 100% 8%, 100% 100%, 0 100%);
      border-top-right-radius: 50px;
      opacity: 0;
      animation: curtainReveal 1s 0.8s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes curtainReveal {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 0.7; transform: translateY(0); }
    }

    /* ── SPOTLIGHT BEAM ───────────────────────────── */
    .beam-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .beam {
      position: absolute;
      top: -8%; right: -5%;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 0 130vh 110vw;
      border-color: transparent transparent rgba(255,255,255,0.055) transparent;
      transform-origin: top right;
      filter: blur(30px);
      opacity: 0;
      animation: beamIn 1.5s 0.4s ease forwards, beamSway 12s 2s ease-in-out infinite;
    }

    .beam-core {
      position: absolute;
      top: -4%; right: -2%;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 0 90vh 60vw;
      border-color: transparent transparent rgba(255,255,255,0.09) transparent;
      transform-origin: top right;
      filter: blur(12px);
      opacity: 0;
      animation: beamIn 1.5s 0.6s ease forwards, beamSway 12s 2s ease-in-out infinite;
    }

    @keyframes beamIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes beamSway {
      0%,100% { transform: rotate(0deg); }
      30%      { transform: rotate(2deg); }
      70%      { transform: rotate(-1.5deg); }
    }

    /* ── 404 NUMBERS ──────────────────────────────── */
    .error-nums {
      position: fixed;
      bottom: 2%; left: -2%;
      z-index: 3;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(130px, 30vw, 260px);
      line-height: 0.85;
      letter-spacing: -8px;
      color: #111;
      -webkit-text-stroke: 2px #333;
      text-shadow: 4px 4px 0 #222;
      user-select: none;
      opacity: 0;
      animation:
        numsIn 1s 1s cubic-bezier(.22,1,.36,1) forwards,
        numFloat 7s 2.2s ease-in-out infinite;
    }

    @keyframes numsIn {
      from { opacity: 0; transform: translateY(40px) rotate(-2deg); }
      to   { opacity: 1; transform: translateY(0px) rotate(-2deg); }
    }

    @keyframes numFloat {
      0%,100% { transform: translateY(0px) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(-1deg); }
    }

    /* ── CONTENT ANCHOR (shared position for skeleton + real content) ── */
    .content-anchor {
      position: fixed;
      top: 50%;
      right: 5%;
      transform: translateY(-50%);
      z-index: 5;
      width: min(540px, 90vw);
    }

    /* ── SKELETON LOADERS ─────────────────────────── */
    .skeleton-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
    }

    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 14px;
    }

    .sk-title-1 { width: 60%; height: 44px; border-radius: 8px; }
    .sk-title-2 { width: 80%; height: 44px; border-radius: 8px; }
    .sk-sub-1   { width: 90%; height: 14px; border-radius: 4px; margin-top: 8px; }
    .sk-sub-2   { width: 75%; height: 14px; border-radius: 4px; }
    .sk-sub-3   { width: 55%; height: 14px; border-radius: 4px; }
    .sk-btn-wrap { display: flex; gap: 12px; margin-top: 22px; }
    .sk-btn-1   { width: 150px; height: 48px; border-radius: 50px; margin-bottom: 0; }
    .sk-btn-2   { width: 110px; height: 48px; border-radius: 50px; margin-bottom: 0; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── REAL CONTENT ────────── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
      text-align: right;
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    .stage.visible {
      display: flex;
      opacity: 1;
      pointer-events: auto;
      animation: contentReveal 0.7s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes contentReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 5.5vw, 48px);
      color: #fff;
      line-height: 1.15;
      margin-bottom: 14px;
      opacity: 0;
      animation: lineUp 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .subtitle {
      font-size: clamp(14px, 2vw, 16px);
      color: #777;
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 36px;
      opacity: 0;
      animation: lineUp 0.6s 0.1s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes lineUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      opacity: 0;
      animation: lineUp 0.6s 0.2s cubic-bezier(.22,1,.36,1) forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 13px 28px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(255,255,255,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 36px rgba(255,255,255,0.25);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 13px 24px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }

    /* ── SCANLINE ─────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
    }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 600px) {
      .content-anchor {
        right: 50%;
        transform: translate(50%, -50%);
      }
      .skeleton-wrap, .stage {
        align-items: center;
        text-align: center;
      }
      .actions { justify-content: center; }
      .subtitle { max-width: 100%; }
      .error-nums { font-size: 22vw; left: -4%; }
      .blanket { width: 80%; height: 55%; }
      .sheet { width: 75%; height: 50%; }
    }
  </style>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Bedroom curtain scene -->
  <div class="bed-scene">
    <div class="blanket"></div>
    <div class="sheet"></div>
  </div>

  <!-- Spotlight beam -->
  <div class="beam-wrap">
    <div class="beam"></div>
    <div class="beam-core"></div>
  </div>

  <!-- 404 numbers -->
  <div class="error-nums" aria-hidden="true">404</div>

  <!-- Shared anchor: skeleton + content occupy same space -->
  <div class="content-anchor">
    <!-- Skeleton loader (shown first) -->
    <div class="skeleton-wrap" id="skeleton">
      <div class="skeleton sk-title-1"></div>
      <div class="skeleton sk-title-2"></div>
      <div class="skeleton sk-sub-1"></div>
      <div class="skeleton sk-sub-2"></div>
      <div class="skeleton sk-sub-3"></div>
      <div class="sk-btn-wrap">
        <div class="skeleton sk-btn-1"></div>
        <div class="skeleton sk-btn-2"></div>
      </div>
    </div>

    <!-- Real content (revealed after skeleton) -->
    <main class="stage" id="content">
      <h1 class="title">Hello? Is<br/>anyone out there?</h1>
      <p class="subtitle">
        The page you requested has drifted into the void — it was moved, deleted, or perhaps never existed at all. Let's get you back on track.
      </p>
      <div class="actions">
        <a href="/" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
          </svg>
          Back to Home
        </a>
        <a href="javascript:history.back()" class="btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Go Back
        </a>
      </div>
    </main>
  </div>

  <script>
    setTimeout(() => {
      const sk = document.getElementById('skeleton');
      const content = document.getElementById('content');
      sk.style.transition = 'opacity 0.4s';
      sk.style.opacity = '0';
      setTimeout(() => {
        sk.style.display = 'none';
        content.classList.add('visible');
      }, 400);
    }, 1600);
  </script>
</body>
</html>
