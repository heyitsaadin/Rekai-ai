<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jarvis AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        :root {
            --tan: #f5e3b0;
            --white: #ffffff;
            --bg: #f3f4f6;
            --dark: #1f2937;
            --red: #ef4444;
            --code-bg: #1e1e2e;
            --code-fg: #cdd6f4;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }

        body {
            background: #d1d5db;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ═══════════════════════════════
           SHARED BUBBLE STYLES
        ═══════════════════════════════ */
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            font-size: 14.5px;
            line-height: 1.6;
            border-radius: 16px;
            word-break: break-word;
        }
        .msg.you {
            align-self: flex-end;
            background: var(--tan);
            color: #000;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }
        .msg.jarvis {
            align-self: flex-start;
            background: var(--white);
            color: var(--dark);
            border-bottom-left-radius: 2px;
            border: 1px solid #e5e7eb;
        }
        .msg.jarvis p            { margin-bottom: 6px; }
        .msg.jarvis p:last-child { margin-bottom: 0; }
        .msg.jarvis strong       { font-weight: 700; color: #111; }
        .msg.jarvis ul,
        .msg.jarvis ol           { padding-left: 18px; margin: 6px 0; }
        .msg.jarvis li           { margin-bottom: 4px; }
        .msg.jarvis h1,
        .msg.jarvis h2,
        .msg.jarvis h3           { font-size: 14px; font-weight: 700; margin: 10px 0 4px; color: #111; }
        .msg.jarvis code         { background: #f0f0f0; border-radius: 4px; padding: 1px 5px; font-family: 'Courier New',monospace; font-size: 13px; color: #c0392b; }
        .msg.jarvis pre          { background: var(--code-bg); border-radius: 10px; padding: 12px 14px; margin: 8px 0; overflow-x: auto; position: relative; }
        .msg.jarvis pre code     { background: none; color: var(--code-fg); font-size: 12.5px; padding: 0; line-height: 1.6; white-space: pre; }

        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: #444; color: #fff; border: none;
            border-radius: 5px; font-size: 10px;
            padding: 3px 8px; cursor: pointer; opacity: 0.7;
        }
        .copy-btn:hover { opacity: 1; }

        .typing-bubble {
            display: none;
            align-self: flex-start;
            background: var(--white);
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            border-bottom-left-radius: 2px;
            padding: 12px 16px;
        }
        .dots { display: inline-flex; gap: 3px; }
        .dot  { width:5px; height:5px; background:#9ca3af; border-radius:50%; animation: dotPulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay:.2s; }
        .dot:nth-child(3) { animation-delay:.4s; }
        @keyframes dotPulse {
            0%,100% { transform:translateY(0); opacity:.4; }
            50%      { transform:translateY(-4px); opacity:1; }
        }
        @keyframes pulse {
            0%   { box-shadow:0 0 0 0 rgba(16,185,129,.7); }
            70%  { box-shadow:0 0 0 6px rgba(16,185,129,0); }
            100% { box-shadow:0 0 0 0 rgba(16,185,129,0); }
        }

        /* ═══════════════════════════════
           MOBILE  (default, < 700px)
        ═══════════════════════════════ */
        .mobile-wrap {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .mob-header {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg,rgba(245,227,176,.5) 0%,#fff 50%);
            border-bottom: 1px solid #d1d5db;
            flex-shrink: 0;
        }
        .mob-header-left { display:flex; align-items:center; gap:12px; }
        .mob-avatar {
            width:45px; height:45px; background:var(--tan);
            border-radius:12px; display:flex; align-items:center;
            justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.1);
        }
        .mob-header h2   { font-size:16px; font-weight:700; }
        .mob-status      { display:flex; align-items:center; gap:5px; }
        .mob-status-dot  { width:7px; height:7px; background:#10b981; border-radius:50%; animation:pulse 2s infinite; }
        .mob-status span { font-size:10px; color:#10b981; font-weight:800; letter-spacing:.5px; }

        .mob-logout {
            color:var(--red); text-decoration:none; font-size:11px; font-weight:700;
            padding:6px 12px; border-radius:8px;
            background:rgba(255,255,255,.8); border:1.5px solid var(--red);
        }

        .mob-chat {
            flex:1; overflow-y:auto; padding:15px;
            display:flex; flex-direction:column; gap:12px;
        }
        .mob-chat::-webkit-scrollbar { display:none; }

        .mob-bottom {
            padding:10px 15px 15px; background:var(--white);
            border-top:1px solid #d1d5db; flex-shrink:0;
        }
        .mob-chips { display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; }
        .mob-chips::-webkit-scrollbar { display:none; }
        .chip {
            background:#f9fafb; color:#4b5563; padding:6px 14px;
            border-radius:10px; font-size:11px; white-space:nowrap;
            border:1px solid #e5e7eb; cursor:pointer;
        }
        .mob-input-pill {
            display:flex; background:#f3f4f6; padding:5px;
            border-radius:24px; align-items:center; border:1px solid #e5e7eb;
        }
        .mob-input-pill input {
            flex:1; background:none; border:none;
            padding:8px 12px; font-size:14.5px; outline:none; color:#000;
        }
        .mob-input-pill button {
            width:36px; height:36px; background:#000; border:none;
            border-radius:50%; cursor:pointer; display:flex;
            align-items:center; justify-content:center;
        }
        .mob-footer { text-align:center; font-size:9px; color:#9ca3af; margin-top:10px; letter-spacing:1.5px; }
        .mob-footer span { color:#4b5563; font-weight:bold; }

        /* ═══════════════════════════════
           DESKTOP  (≥ 700px)
        ═══════════════════════════════ */
        .desk-wrap {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: calc(100dvh - 40px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,.15);
        }

        @media (min-width: 700px) {
            .mobile-wrap { display: none !important; }
            .desk-wrap   { display: flex !important; }
            body         { padding: 20px; }
        }

        .desk-side {
            width: 240px; flex-shrink:0;
            background: var(--white);
            border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column;
            padding: 24px 18px; gap: 20px;
        }
        .desk-brand      { display:flex; align-items:center; gap:12px; }
        .desk-avatar     { width:48px; height:48px; background:var(--tan); border-radius:14px; display:flex; align-items:center; justify-content:center; }
        .desk-brand h2   { font-size:18px; font-weight:800; }
        .desk-status     { display:flex; align-items:center; gap:5px; margin-top:2px; }
        .desk-dot        { width:7px; height:7px; background:#10b981; border-radius:50%; animation:pulse 2s infinite; }
        .desk-status span{ font-size:10px; color:#10b981; font-weight:800; letter-spacing:.5px; }
        .desk-divider    { border:none; border-top:1px solid #e5e7eb; }
        .desk-label      { font-size:10px; font-weight:700; color:#9ca3af; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
        .desk-shortcuts  { display:flex; flex-direction:column; gap:6px; }
        .desk-sc {
            background:#f9fafb; border:1px solid #e5e7eb; border-radius:10px;
            padding:10px 14px; font-size:13px; color:#374151;
            cursor:pointer; text-align:left; transition:background .15s;
        }
        .desk-sc:hover { background:var(--tan); }
        .desk-footer   { margin-top:auto; display:flex; flex-direction:column; gap:10px; }
        .desk-logout   {
            display:block; text-align:center; color:var(--red); text-decoration:none;
            font-size:12px; font-weight:700; padding:9px; border-radius:10px;
            border:1.5px solid var(--red); background:rgba(255,255,255,.8);
        }
        .desk-logout:hover { background:#fee2e2; }
        .desk-tag      { text-align:center; font-size:9px; color:#9ca3af; letter-spacing:1.5px; }
        .desk-tag span { color:#4b5563; font-weight:bold; }

        .desk-main  { flex:1; display:flex; flex-direction:column; background:var(--bg); }
        .desk-chat  {
            flex:1; overflow-y:auto; padding:24px;
            display:flex; flex-direction:column; gap:14px;
        }
        .desk-chat::-webkit-scrollbar       { width:4px; }
        .desk-chat::-webkit-scrollbar-track { background:transparent; }
        .desk-chat::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:4px; }

        .desk-input-bar {
            padding:14px 24px 18px; background:var(--white);
            border-top:1px solid #e5e7eb;
            display:flex; gap:10px; align-items:center;
        }
        .desk-input-bar input {
            flex:1; background:#f3f4f6; border:1px solid #e5e7eb;
            border-radius:14px; padding:12px 18px; font-size:14.5px;
            outline:none; color:#000;
        }
        .desk-input-bar input:focus { border-color:#d1a84b; }
        .desk-input-bar button {
            width:44px; height:44px; background:#000; border:none;
            border-radius:12px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .desk-input-bar button:hover { background:#333; }

        /* ── Hamburger menu ── */
        .ham-wrap { position: relative; }
        .ham-btn {
            width: 38px; height: 38px;
            background: rgba(255,255,255,.85);
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; cursor: pointer; padding: 8px 10px;
        }
        .ham-btn span {
            display: block; width: 18px; height: 2px;
            background: #374151; border-radius: 2px;
        }
        .ham-btn:hover { background: var(--tan); }
        .ham-menu {
            display: none;
            position: absolute; top: 46px; right: 0;
            width: 190px;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,.13);
            z-index: 999; overflow: hidden;
        }
        .ham-menu.open { display: block; }
        .ham-user {
            padding: 12px 16px 8px;
            font-size: 11px; font-weight: 700;
            color: #9ca3af; letter-spacing: .5px;
            border-bottom: 1px solid #f3f4f6;
        }
        .ham-item {
            display: block; padding: 11px 16px;
            font-size: 13px; color: #374151;
            text-decoration: none;
            transition: background .12s;
        }
        .ham-item:hover { background: #f9fafb; }
        .ham-divider { border: none; border-top: 1px solid #f3f4f6; margin: 2px 0; }
        .ham-item.danger { color: #ef4444; }
        .ham-item.danger:hover { background: #fff5f5; }
    </style>
</head>
<body>

<!-- Raw message data injected once as JSON — no Jinja in HTML attributes -->
<script id="msgData" type="application/json">{{ messages | tojson }}</script>

<!-- SVG logo reused -->
<template id="logoSvg">
    <svg viewBox="0 0 100 100" width="32" height="32">
        <path d="M34,29 L48,29 L51,49 L37,49 Z" fill="black"/>
        <path d="M54,29 L63,29 Q74,29 74,39 Q74,49 63,49 L54,49 Z" fill="black"/>
        <circle cx="42" cy="62" r="11" fill="black"/>
        <polygon points="54,52 74,72 54,72" fill="black"/>
    </svg>
</template>

<!-- ════════════ MOBILE ════════════ -->
<div class="mobile-wrap">
    <div class="mob-header">
        <div class="mob-header-left">
            <div class="mob-avatar" id="mobLogo"></div>
            <div>
                <h2>Jarvis Ai</h2>
                <div class="mob-status">
                    <div class="mob-status-dot"></div>
                    <span>ONLINE</span>
                </div>
            </div>
        </div>
        <div class="ham-wrap">
            <button class="ham-btn" onclick="toggleHam()">
                <span></span><span></span><span></span>
            </button>
            <div class="ham-menu" id="hamMenu">
                <div class="ham-user">{{ username }}</div>
                <a class="ham-item" href="#">ℹ️ About Jarvis</a>
                <a class="ham-item" href="#">👨‍💻 Developer</a>
                <hr class="ham-divider">
                <a class="ham-item danger" href="/logout">🚪 Logout</a>
            </div>
        </div>
    </div>

    <div class="mob-chat" id="mobChat"></div>

    <div class="mob-bottom">
        <div class="mob-chips">
            <div class="chip" onclick="quickSend('mob','What time is it?')">Time</div>
            <div class="chip" onclick="quickSend('mob','What is the date today?')">Date</div>
            <div class="chip" onclick="quickSend('mob','history')">History</div>
        </div>
        <form method="POST" class="mob-input-pill" id="mobForm">
            <input type="text" name="message" id="mobInput" autocomplete="off" required>
            <button type="submit" id="mobBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
        <p class="mob-footer">Created By <span>AADIN</span></p>
    </div>
</div>

<!-- ════════════ DESKTOP ════════════ -->
<div class="desk-wrap">
    <div class="desk-side">
        <div class="desk-brand">
            <div class="desk-avatar" id="deskLogo"></div>
            <div>
                <h2>Jarvis</h2>
                <div class="desk-status">
                    <div class="desk-dot"></div>
                    <span>ONLINE</span>
                </div>
            </div>
        </div>
        <hr class="desk-divider">
        <div>
            <div class="desk-label">Quick Actions</div>
            <div class="desk-shortcuts">
                <button class="desk-sc" onclick="quickSend('desk','What time is it?')">🕐 Current Time</button>
                <button class="desk-sc" onclick="quickSend('desk','What is the date today?')">📅 Today's Date</button>
                <button class="desk-sc" onclick="quickSend('desk','history')">📋 My History</button>
            </div>
        </div>
        <div class="desk-footer">
            <a href="/logout" class="desk-logout">LOGOUT</a>
            <p class="desk-tag"> Created By <span>AADIN</span></p>
        </div>
    </div>

    <div class="desk-main">
        <div class="desk-chat" id="deskChat"></div>
        <div class="desk-input-bar">
            <form method="POST" id="deskForm" style="display:flex;flex:1;gap:10px;align-items:center;">
                <input type="text" name="message" id="deskInput" placeholder="Ask Jarvis anything..." autocomplete="off" required>
                <button type="submit" id="deskBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const messages = JSON.parse(document.getElementById('msgData').textContent);
    marked.setOptions({ breaks: true, gfm: true });

    // ── Copy buttons for code blocks ──
    function addCopyBtns(el) {
        el.querySelectorAll('pre').forEach(pre => {
            if (pre.querySelector('.copy-btn')) return;
            const btn = document.createElement('button');
            btn.className = 'copy-btn'; btn.textContent = 'Copy';
            btn.onclick = () => {
                navigator.clipboard.writeText(pre.querySelector('code')?.innerText || pre.innerText);
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            };
            pre.appendChild(btn);
        });
    }

    // ── Typewriter effect ──
    function typewriter(el, html, container) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        // Skip for code-heavy or very short replies
        if (tmp.querySelector('pre') || tmp.innerText.length < 3) {
            el.innerHTML = html; addCopyBtns(el); return;
        }
        const text = tmp.innerText;
        let i = 0;
        const speed = text.length > 120 ? 8 : 15;
        el.textContent = '';
        function tick() {
            if (i <= text.length) {
                el.textContent = text.slice(0, i++);
                if (container) container.scrollTop = container.scrollHeight;
                setTimeout(tick, speed);
            } else {
                el.innerHTML = html;
                addCopyBtns(el);
                if (container) container.scrollTop = container.scrollHeight;
            }
        }
        tick();
    }

    // ── Make a chat bubble ──
    function makeBubble(msg, animate, container) {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.sender === 'You' ? 'you' : 'jarvis');
        if (msg.sender === 'You') {
            div.textContent = msg.text;
        } else {
            const html = marked.parse(msg.text);
            if (animate) {
                typewriter(div, html, container);
            } else {
                div.innerHTML = html;
                addCopyBtns(div);
            }
        }
        return div;
    }

    function makeTyping() {
        const div = document.createElement('div');
        div.className = 'typing-bubble';
        div.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        return div;
    }

    function populateChat(containerId) {
        const container = document.getElementById(containerId);
        // Detect if this page load is a fresh reply (came from POST)
        const isNewReply = performance.navigation ? performance.navigation.type === 0 && document.referrer.includes(window.location.pathname) : false;
        messages.forEach((msg, idx) => {
            const isLast = idx === messages.length - 1;
            const animate = isLast && msg.sender !== 'You' && isNewReply;
            container.appendChild(makeBubble(msg, animate, container));
        });
        const typing = makeTyping();
        container.appendChild(typing);
        container.scrollTop = container.scrollHeight;
        return typing;
    }

    const mobTyping  = populateChat('mobChat');
    const deskTyping = populateChat('deskChat');

    // SVG logos
    const
